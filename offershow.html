<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عروض الأسعار المتاحة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --accent-color: #1abc9c;
            --light-color: #f5f7fa;
            --dark-color: #34495e;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --border-radius: 16px;
            --box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-secondary: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            --gradient-success: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            --gradient-warning: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* شريط حالة الاتصال */
        .connection-status {
            position: fixed;
            top: 15px;
            left: 15px;
            background: white;
            padding: 10px 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #28a745;
            transition: var(--transition);
        }

        .loading-spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            text-align: center;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            border: 0.3em solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            to { transform: rotate(360deg); }
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            box-shadow: var(--box-shadow);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
        }

        .header h1 {
            color: var(--secondary-color);
            text-align: center;
            margin-bottom: 15px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .user-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: var(--gradient-primary);
            padding: 20px;
            border-radius: 12px;
            color: white;
        }

        .user-info div {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: var(--box-shadow);
            transition: var(--transition);
            border-left: 4px solid var(--primary-color);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 14px;
            color: var(--dark-color);
            font-weight: 600;
        }

        .filters {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            box-shadow: var(--box-shadow);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 700;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
        }

        .filter-group select,
        .filter-group input {
            padding: 14px 16px;
            border: 2px solid #e8ecef;
            border-radius: 10px;
            font-size: 15px;
            transition: var(--transition);
            background: white;
            font-family: inherit;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            transform: translateY(-2px);
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
            grid-column: 1 / -1;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 140px;
            justify-content: center;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-secondary {
            background: var(--gradient-secondary);
            color: white;
        }

        .btn-success {
            background: var(--gradient-success);
            color: white;
        }

        .btn-warning {
            background: var(--gradient-warning);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .offer-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--box-shadow);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .offer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
        }

        .offer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .offer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 15px;
        }

        .offer-title-group {
            flex: 1;
            min-width: 0;
        }

        .offer-item-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--secondary-color);
            line-height: 1.4;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .offer-item-id {
            font-size: 14px;
            color: var(--dark-color);
            font-weight: 600;
            background: var(--light-color);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .offer-badge {
            background: var(--gradient-primary);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* حقل عرض اسم الصنف الجديد */
        .offer-item-display {
            color: var(--dark-color);
            font-size: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 15px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
        }

        .offer-store {
            color: var(--dark-color);
            font-size: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--light-color);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .offer-dates {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: var(--light-color);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .date-item {
            text-align: center;
        }

        .date-label {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 5px;
            display: block;
        }

        .date-value {
            color: var(--dark-color);
            font-weight: 500;
        }

        .offer-prices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .price-item {
            text-align: center;
            padding: 15px 10px;
            background: var(--light-color);
            border-radius: 10px;
            transition: var(--transition);
        }

        .price-item:hover {
            background: var(--gradient-primary);
            color: white;
            transform: translateY(-2px);
        }

        .price-item:hover .price-label,
        .price-item:hover .price-value {
            color: white;
        }

        .price-label {
            font-size: 12px;
            color: var(--dark-color);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .price-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary-color);
        }

        .offer-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 2px solid var(--light-color);
            gap: 10px;
            margin-top: auto;
        }

        .offer-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--light-color);
        }

        .status-active {
            color: var(--success-color);
            background: rgba(46, 204, 113, 0.1);
        }

        .status-inactive {
            color: var(--danger-color);
            background: rgba(231, 76, 60, 0.1);
        }

        /* قسم العروض النشطة */
        .active-offers-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--box-shadow);
            margin-top: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light-color);
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .active-count {
            background: var(--gradient-success);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .active-offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .active-offer-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border: 2px solid rgba(46, 204, 113, 0.2);
            transition: var(--transition);
        }

        .active-offer-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border-color: var(--success-color);
        }

        .active-offer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .active-offer-title-group {
            flex: 1;
        }

        .active-offer-item-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .active-offer-item-id {
            font-size: 13px;
            color: var(--dark-color);
            font-weight: 600;
        }

        .active-offer-badge {
            background: var(--gradient-success);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }

        .active-offer-prices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .active-price-item {
            text-align: center;
            padding: 12px 8px;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 8px;
        }

        .active-price-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--success-color);
        }

        .active-offer-dates {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--dark-color);
            background: var(--light-color);
            padding: 10px;
            border-radius: 6px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 18px;
            grid-column: 1 / -1;
        }

        .no-offers {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 18px;
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            backdrop-filter: blur(10px);
        }

        /* تحسينات للجوال */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                max-width: 100%;
            }

            .header {
                padding: 20px 15px;
                border-radius: 12px;
            }

            .header h1 {
                font-size: 22px;
                flex-direction: column;
                gap: 8px;
            }

            .user-info {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 15px;
            }

            .user-info div {
                justify-content: flex-start;
                padding: 12px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-number {
                font-size: 24px;
            }

            .stat-label {
                font-size: 12px;
            }

            .filters {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 20px 15px;
            }

            .filter-group select,
            .filter-group input {
                padding: 12px 14px;
                font-size: 14px;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                width: 100%;
                padding: 16px;
                font-size: 14px;
            }

            .offers-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .offer-card {
                padding: 20px 15px;
                border-radius: 12px;
            }

            .offer-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .offer-badge {
                align-self: flex-start;
            }

            .offer-item-display {
                padding: 10px 12px;
                font-size: 14px;
            }

            .offer-store {
                padding: 8px 12px;
                font-size: 14px;
            }

            .offer-dates {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 12px;
            }

            .offer-prices {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .price-item {
                padding: 12px 5px;
            }

            .price-value {
                font-size: 16px;
            }

            .offer-footer {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .offer-status {
                justify-content: center;
                padding: 10px;
            }

            .connection-status {
                top: 10px;
                left: 10px;
                right: 10px;
                font-size: 12px;
                padding: 8px 12px;
            }

            .active-offers-section {
                padding: 20px 15px;
            }

            .section-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .active-offers-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .active-offer-prices {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 20px;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
            }

            .stat-number {
                font-size: 20px;
            }

            .offer-prices {
                grid-template-columns: 1fr;
            }

            .price-item {
                padding: 15px;
            }

            .active-offer-prices {
                grid-template-columns: 1fr;
            }

            .offer-item-name {
                font-size: 18px;
                -webkit-line-clamp: 3;
            }

            .active-offer-item-name {
                font-size: 16px;
                -webkit-line-clamp: 3;
            }
        }

        /* أنيميشن */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .offer-card {
            animation: fadeInUp 0.5s ease;
        }

        /* طباعة */
        @media print {
            .no-print {
                display: none !important;
            }
            
            body {
                background: white;
                padding: 0;
            }
            
            .offer-card {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }

        .mt-3 {
            margin-top: 1rem;
        }

        /* تحسين شريط البحث */
        .search-container {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }

        .search-input {
            padding-right: 45px !important;
        }
    </style>
</head>
<body>
    <!-- شريط حالة الاتصال -->
    <div class="connection-status no-print">
        <span id="connection-status">
            <i class="fas fa-spinner fa-spin"></i> جاري الاتصال...
        </span>
    </div>

    <!-- مؤشر التحميل -->
    <div id="loading-spinner" class="loading-spinner no-print">
        <div class="spinner-border text-primary"></div>
        <div class="mt-3">جاري تحميل العروض...</div>
    </div>

    <div class="container">
        <!-- الرأس -->
        <div class="header no-print">
            <h1><i class="fas fa-tags"></i> عروض الأسعار المتاحة</h1>
            <div class="user-info">
                <div>
                    <i class="fas fa-user"></i>
                    <span id="userName">المستخدم: --</span>
                </div>
                <div>
                    <i class="fas fa-store"></i>
                    <span id="storeName">الفرع: --</span>
                </div>
                <div>
                    <i class="fas fa-calendar"></i>
                    <span id="currentDate">--</span>
                </div>
            </div>
        </div>

        <!-- الإحصائيات -->
        <div class="stats" id="statsContainer">
            <!-- سيتم تعبئتها بالجافاسكريبت -->
        </div>

        <!-- الفلاتر -->
        <div class="filters no-print">
            <div class="filter-group">
                <label><i class="fas fa-filter"></i> حالة العرض</label>
                <select id="statusFilter">
                    <option value="all">جميع العروض</option>
                    <option value="active">العروض النشطة فقط</option>
                    <option value="inactive">العروض المنتهية</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-calendar-day"></i> من تاريخ</label>
                <input type="date" id="startDateFilter">
            </div>
            <div class="filter-group">
                <label><i class="fas fa-calendar-day"></i> إلى تاريخ</label>
                <input type="date" id="endDateFilter">
            </div>
            <div class="filter-group search-container">
                <label><i class="fas fa-search"></i> بحث بالصنف</label>
                <input type="text" id="itemSearch" class="search-input" placeholder="اكتب كود أو اسم الصنف...">
                <i class="fas fa-search search-icon"></i>
            </div>
            <div class="actions">
                <button class="btn btn-primary" id="applyFilters">
                    <i class="fas fa-search"></i> تطبيق الفلاتر
                </button>
                <button class="btn btn-secondary" id="resetFilters">
                    <i class="fas fa-redo"></i> إعادة تعيين
                </button>
                <button class="btn btn-success" id="refreshData">

            <!-- سيتم تعبئتها بالجافاسكريبت -->
        </div>

        <div class="no-offers" id="noOffersMessage" style="display: none;">
            <i class="fas fa-inbox"></i> لا توجد عروض متاحة

        <!-- قسم العروض النشطة -->
        <div class="active-offers-section" id="activeOffersSection" style="display: none;">

                    <i class="fas fa-bolt"></i>
                    العروض النشطة حالياً
                </div>
                <div class="active-count" id="activeOffersCount">0 عرض</div>

                <!-- سيتم تعبئتها بالجافاسكريبت -->
            </div>
        </div>
    </div>

    <script>
        class OffersApp {
            constructor() {
                this.SUPABASE_URL = 'https://rvjacvrrpguehbapvewe.supabase.co';
                this.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2amFjdnJycGd1ZWhiYXB2ZXdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMwMjUxNTksImV4cCI6MjA3ODYwMTE1OX0.wSavKzxKOF7-56G-pzDMtbXNrCNAbGs0wvadw-cilBg';
                this.supabase = null;
                this.isOnline = false;
                
                this.state = {
                    offers: [],
                    filteredOffers: [],
                    activeOffers: [],
                    stores: [],
                    items: [],
                    filters: {
                        status: 'all',
                        startDate: '',
                        endDate: '',
                        itemSearch: ''
                    }
                };
                
                this.itemsMap = new Map(); // خريطة لتخزين أسماء الأصناف
                
                this.init();
            }

            async init() {
                this.dom = this._initDOM();
                this._bindEvents();
                const connected = await this.initSupabase();
                
                if (connected) {
                    await this.loadUserInfo();
                    await this.loadStores();
                    await this.loadItems(); // تحميل الأصناف أولاً
                    await this.loadOffers(); // ثم تحميل العروض
                    this.addEnterNavigation();
                } else {
                    this.showError('فشل في الاتصال بقاعدة البيانات. يرجى التحقق من الاتصال بالإنترنت.');
                }
            }

            _initDOM() {
                return {
                    connectionStatus: document.getElementById("connection-status"),
                    loadingSpinner: document.getElementById("loading-spinner"),
                    statsContainer: document.getElementById("statsContainer"),
                    offersContainer: document.getElementById("offersContainer"),
                    noOffersMessage: document.getElementById("noOffersMessage"),
                    loadingMessage: document.getElementById("loadingMessage"),
                    activeOffersSection: document.getElementById("activeOffersSection"),
                    activeOffersContainer: document.getElementById("activeOffersContainer"),
                    activeOffersCount: document.getElementById("activeOffersCount")
                };
            }

            async initSupabase() {
                try {
                    this.showLoading(true);
                    this.updateConnectionStatus('warning', '<i class="fas fa-spinner fa-spin"></i> جاري الاتصال...');
                    
                    console.log('🔄 جاري تهيئة Supabase...');
                    this.supabase = supabase.createClient(this.SUPABASE_URL, this.SUPABASE_KEY);
                    
                    const { data, error } = await this.supabase
                        .from('item_price_offers')
                        .select('offer_id')
                        .limit(1);
                    
                    if (error) {
                        console.error('❌ خطأ في الاتصال:', error);
                        throw error;
                    }

                    this.isOnline = true;
                    this.updateConnectionStatus('success', '<i class="fas fa-cloud-check"></i> متصل بالسحابة');
                    console.log('✅ Supabase متصل بنجاح');
                    return true;
                    
                } catch (error) {
                    console.error('❌ فشل في الاتصال بـ Supabase:', error);
                    this.isOnline = false;
                    this.updateConnectionStatus('danger', '<i class="fas fa-cloud-slash"></i> غير متصل');
                    
                    let errorMessage = 'فشل في الاتصال بقاعدة البيانات';
                    if (error.message) {
                        errorMessage += `: ${error.message}`;
                    }
                    this.showError(errorMessage);
                    return false;
                } finally {
                    this.showLoading(false);
                }
            }

            updateConnectionStatus(type, message) {
                if (!this.dom.connectionStatus) return;
                
                this.dom.connectionStatus.innerHTML = message;
                this.dom.connectionStatus.style.borderLeftColor = 
                    type === 'success' ? '#28a745' : 
                    type === 'danger' ? '#dc3545' : '#ffc107';
            }

            showLoading(show) {
                if (this.dom.loadingSpinner) {
                    this.dom.loadingSpinner.style.display = show ? 'block' : 'none';
                }
                if (this.dom.loadingMessage) {
                    this.dom.loadingMessage.style.display = show ? 'block' : 'none';
                }
                if (this.dom.offersContainer) {
                    this.dom.offersContainer.style.display = show ? 'none' : 'grid';
                }
            }

            // تحميل معلومات المستخدم
            loadUserInfo() {
                return new Promise((resolve) => {
                    const username = localStorage.getItem("username") || sessionStorage.getItem("username") || "مستخدم";
                    const storeName = localStorage.getItem("store_name") || sessionStorage.getItem("store_name") || "غير محدد";
                    
                    document.getElementById('userName').textContent = `المستخدم: ${username}`;
                    document.getElementById('storeName').textContent = `الفرع: ${storeName}`;
                    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ar-EG');
                    
                    resolve();
                });
            }

            // تحميل قائمة المخازن
            async loadStores() {
                try {
                    if (!this.supabase) {
                        this.showError('غير متصل بقاعدة البيانات');
                        return;
                    }

                    const { data, error } = await this.supabase
                        .from('stores')
                        .select('store_id, store_name')
                        .order('store_name');

                    if (error) {
                        console.error('❌ خطأ في تحميل المخازن:', error);
                        return;
                    }

                    this.state.stores = data || [];
                    console.log(`✅ تم تحميل ${this.state.stores.length} مخزن`);
                } catch (error) {
                    console.error('❌ خطأ في تحميل المخازن:', error);
                }
            }

            // تحميل قائمة الأصناف
            async loadItems() {
                try {
                    if (!this.supabase) {
                        this.showError('غير متصل بقاعدة البيانات');
                        return;
                    }

                    console.log('🔄 جاري تحميل قائمة الأصناف...');
                    const { data, error } = await this.supabase
                        .from('items')
                        .select('item_id, item_nm')
                        .order('item_id');

                    if (error) {
                        console.error('❌ خطأ في تحميل الأصناف:', error);
                        return;
                    }

                    this.state.items = data || [];
                    console.log(`✅ تم تحميل ${this.state.items.length} صنف`);
                    
                    // ✅ إنشاء خريطة للبحث السريع
                    this.itemsMap = new Map();
                    this.state.items.forEach(item => {
                        this.itemsMap.set(item.item_id, item.item_nm);
                    });
                    
                    console.log(`✅ تم إنشاء خريطة بأسماء ${this.itemsMap.size} صنف`);
                    
                    // عرض عينة للتحقق
                    if (this.state.items.length > 0) {
                        console.log('🔍 عينة من الأصناف المحملة:', {
                            first_item: this.state.items[0],
                            map_sample: this.itemsMap.get(this.state.items[0].item_id)
                        });
                    }
                    
                    // إنشاء خيارات البحث الذكي
                    this.setupSmartSearch();
                    
                } catch (error) {
                    console.error('❌ خطأ في تحميل الأصناف:', error);
                }
            }

            // تحميل العروض من جدول item_price_offers
            async loadOffers() {
                try {
                    this.showLoading(true);
                    
                    if (!this.supabase || !this.isOnline) {
                        this.showError('غير متصل بقاعدة البيانات');
                        return;
                    }

                    console.log('🔄 جاري تحميل العروض...');

                    // جلب العروض
                    const { data: offersData, error: offersError } = await this.supabase
                        .from('item_price_offers')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (offersError) {
                        console.error('❌ خطأ في تحميل العروض:', offersError);
                        throw new Error(`فشل تحميل العروض: ${offersError.message}`);
                    }

                    console.log(`✅ تم تحميل ${offersData?.length || 0} عرض`);

                    if (!offersData || offersData.length === 0) {
                        this.state.offers = [];
                        this.applyFilters();
                        this.updateStats();
                        this.updateActiveOffers();
                        return;
                    }

                    // دمج البيانات مع أسماء الأصناف
                    const mergedOffers = offersData.map(offer => {
                        const storeName = offer.store_name || `المخزن ${offer.store_id}`;
                        
                        // ✅ الحصول على اسم الصنف من itemsMap
                        const itemName = this.itemsMap ? this.itemsMap.get(offer.item_id) : `الصنف ${offer.item_id}`;
                        
                        // DEBUG: التحقق من كل عرض
                        if (!itemName || itemName === `الصنف ${offer.item_id}`) {
                            console.warn(`⚠️ لم يتم العثور على اسم للصنف ${offer.item_id} في itemsMap`);
                        }

                        return {
                            ...offer,
                            store_name: storeName,
                            item_name: itemName  // ✅ إضافة اسم الصنف هنا
                        };
                    });

                    // DEBUG: عرض عينة من البيانات المدمجة
                    if (mergedOffers.length > 0) {
                        console.log('🔍 عينة من البيانات المدمجة:', {
                            offer_id: mergedOffers[0].offer_id,
                            item_id: mergedOffers[0].item_id,
                            item_name: mergedOffers[0].item_name,
                            has_itemsMap: !!this.itemsMap,
                            itemsMap_size: this.itemsMap ? this.itemsMap.size : 0
                        });
                    }

                    this.state.offers = mergedOffers;
                    console.log(`✅ تم دمج ${this.state.offers.length} عرض بنجاح`);
                    
                    this.applyFilters();
                    this.updateStats();
                    this.updateActiveOffers();
                    
                } catch (error) {
                    console.error('❌ خطأ في تحميل العروض:', error);
                    this.showError(`حدث خطأ في تحميل العروض: ${error.message}`);
                    this.state.offers = [];
                    this.applyFilters();
                    this.updateStats();
                    this.updateActiveOffers();
                } finally {
                    this.showLoading(false);
                }
            }
            // إعداد البحث الذكي
            setupSmartSearch() {
                const itemSearch = document.getElementById('itemSearch');
                if (!itemSearch) return;
                
                const datalist = document.createElement('datalist');
                datalist.id = 'itemSuggestions';
                
                this.state.items.forEach(item => {
                    const option = document.createElement('option');
                    option.value = `${item.item_id} - ${item.item_nm}`;
                    option.dataset.id = item.item_id;
                    datalist.appendChild(option);
                });
                
                document.body.appendChild(datalist);
                itemSearch.setAttribute('list', 'itemSuggestions');
            }

            // تحميل العروض من جدول item_price_offers
            async loadOffers() {
                try {
                    this.showLoading(true);
                    
                    if (!this.supabase || !this.isOnline) {
                        this.showError('غير متصل بقاعدة البيانات');
                        return;
                    }

                    console.log('🔄 جاري تحميل العروض...');

                    // جلب العروض
                    const { data: offersData, error: offersError } = await this.supabase
                        .from('item_price_offers')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (offersError) {
                        console.error('❌ خطأ في تحميل العروض:', offersError);
                        throw new Error(`فشل تحميل العروض: ${offersError.message}`);
                    }

                    console.log(`✅ تم تحميل ${offersData?.length || 0} عرض`);

                    if (!offersData || offersData.length === 0) {
                        this.state.offers = [];
                        this.applyFilters();
                        this.updateStats();
                        this.updateActiveOffers();
                        return;
                    }

                    // DEBUG: عرض عينة من العروض
                    if (offersData.length > 0) {
                        console.log('🔍 عينة من بيانات العروض الخام:', offersData[0]);
                    }

                    // جلب بيانات المخازن
                    const storeIds = [...new Set(offersData.map(offer => offer.store_id).filter(id => id))];
                    let storesMap = new Map();
                    
                    if (storeIds.length > 0) {
                        const { data: storesData, error: storesError } = await this.supabase
                            .from('stores')
                            .select('store_id, store_name')
                            .in('store_id', storeIds);

                        if (storesError) {
                            console.error('❌ خطأ في تحميل المخازن:', storesError);
                        } else if (storesData) {
                            storesData.forEach(store => {
                                storesMap.set(store.store_id, store.store_name);
                            });
                            console.log(`✅ تم تحميل ${storesMap.size} اسم مخزن`);
                        }
                    }

                    // دمج البيانات مع أسماء الأصناف
                    const mergedOffers = offersData.map(offer => {
                        const storeName = storesMap.get(offer.store_id) || `المخزن ${offer.store_id}`;
                        
                        // ✅ الحصول على اسم الصنف من الخريطة
                        const itemName = this.itemsMap.get(offer.item_id) || `الصنف ${offer.item_id}`;
                        
                        // DEBUG: التحقق من كل عرض
                        console.log('🔍 دمج عرض:', {
                            item_id: offer.item_id,
                            item_name: itemName,
                            found_in_map: this.itemsMap.has(offer.item_id)
                        });

                        return {
                            ...offer,
                            store_name: storeName,
                            item_name: itemName  // ✅ إضافة اسم الصنف هنا
                        };
                    });

                    // DEBUG: عرض عينة من البيانات المدمجة
                    if (mergedOffers.length > 0) {
                        console.log('🔍 عينة من البيانات المدمجة:', {
                            offer_id: mergedOffers[0].offer_id,
                            item_id: mergedOffers[0].item_id,
                            item_name: mergedOffers[0].item_name,
                            store_name: mergedOffers[0].store_name
                        });
                    }

                    this.state.offers = mergedOffers;
                    console.log(`✅ تم دمج ${this.state.offers.length} عرض بنجاح`);
                    
                    this.applyFilters();
                    this.updateStats();
                    this.updateActiveOffers();
                    
                } catch (error) {
                    console.error('❌ خطأ في تحميل العروض:', error);
                    this.showError(`حدث خطأ في تحميل العروض: ${error.message}`);
                    this.state.offers = [];
                    this.applyFilters();
                    this.updateStats();
                    this.updateActiveOffers();
                } finally {
                    this.showLoading(false);
                }
            }

            // تطبيق الفلاتر
            applyFilters() {
                let filtered = [...this.state.offers];

                if (this.state.filters.status === 'active') {
                    filtered = filtered.filter(offer => this.isOfferActive(offer));
                } else if (this.state.filters.status === 'inactive') {
                    filtered = filtered.filter(offer => !this.isOfferActive(offer));
                }

                if (this.state.filters.startDate) {
                    filtered = filtered.filter(offer => 
                        new Date(offer.start_date) >= new Date(this.state.filters.startDate)
                    );
                }

                if (this.state.filters.endDate) {
                    filtered = filtered.filter(offer => {
                        const endDate = offer.end_date ? new Date(offer.end_date) : null;
                        return !endDate || endDate <= new Date(this.state.filters.endDate);
                    });
                }

                if (this.state.filters.itemSearch) {
                    const searchTerm = this.state.filters.itemSearch.toLowerCase().trim();
                    filtered = filtered.filter(offer => {
                        const itemId = offer.item_id?.toString() || '';
                        const itemName = offer.item_name || '';
                        const storeName = offer.store_name || '';
                        
                        return itemId.includes(searchTerm) ||
                            itemName.toLowerCase().includes(searchTerm) ||
                            `${itemId} - ${itemName}`.toLowerCase().includes(searchTerm) ||
                            storeName.toLowerCase().includes(searchTerm);
                    });
                }

                this.state.filteredOffers = filtered;
                this.renderOffers();
            }

            // التحقق من أن العرض نشط
            isOfferActive(offer) {
                try {
                    const today = new Date();
                    const startDate = new Date(offer.start_date);
                    const endDate = offer.end_date ? new Date(offer.end_date) : null;
                    
                    const isDateActive = today >= startDate && (!endDate || today <= endDate);
                    const isActive = offer.is_active !== false;
                    
                    return isDateActive && isActive;
                } catch (error) {
                    console.error('خطأ في التحقق من حالة العرض:', error, offer);
                    return false;
                }
            }

            // تحديث الإحصائيات
            updateStats() {
                const total = this.state.offers.length;
                const active = this.state.offers.filter(offer => this.isOfferActive(offer)).length;
                const inactive = total - active;
                const stores = new Set(this.state.offers.map(offer => offer.store_id)).size;
                const items = new Set(this.state.offers.map(offer => offer.item_id)).size;

                const statsHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${total}</div>
                        <div class="stat-label">إجمالي العروض</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${active}</div>
                        <div class="stat-label">العروض النشطة</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${inactive}</div>
                        <div class="stat-label">العروض المنتهية</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stores}</div>
                        <div class="stat-label">عدد المخازن</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${items}</div>
                        <div class="stat-label">عدد الأصناف</div>
                    </div>
                `;

                this.dom.statsContainer.innerHTML = statsHTML;
            }

            // تحديث العروض النشطة
            updateActiveOffers() {
                this.state.activeOffers = this.state.offers.filter(offer => this.isOfferActive(offer));
                
                if (this.state.activeOffers.length > 0) {
                    this.dom.activeOffersSection.style.display = 'block';
                    this.dom.activeOffersCount.textContent = `${this.state.activeOffers.length} عرض`;
                    this.renderActiveOffers();
                } else {
                    this.dom.activeOffersSection.style.display = 'none';
                }
            }

            // عرض العروض
            renderOffers() {
                if (this.state.filteredOffers.length === 0) {
                    this.dom.offersContainer.style.display = 'none';
                    this.dom.noOffersMessage.style.display = 'block';
                    this.dom.noOffersMessage.innerHTML = `
                        <i class="fas fa-inbox"></i> 
                        ${this.state.offers.length === 0 ? 'لا توجد عروض في النظام' : 'لا توجد عروض متطابقة مع معايير البحث'}
                        <br>
                        <small style="color: #ccc;">إجمالي العروض في النظام: ${this.state.offers.length}</small>
                    `;
                    return;
                }

                this.dom.offersContainer.style.display = 'grid';
                this.dom.noOffersMessage.style.display = 'none';

                const offersHTML = this.state.filteredOffers.map(offer => this.createOfferCard(offer)).join('');
                this.dom.offersContainer.innerHTML = offersHTML;
            }

            // عرض العروض النشطة
            renderActiveOffers() {
                const activeOffersHTML = this.state.activeOffers.map(offer => this.createActiveOfferCard(offer)).join('');
                this.dom.activeOffersContainer.innerHTML = activeOffersHTML;
            }

            // إنشاء بطاقة عرض
            createOfferCard(offer) {
                const isActive = this.isOfferActive(offer);
                const storeName = offer.store_name || `المخزن ${offer.store_id}`;
                
                // ✅ البحث عن اسم الصنف من this.state.items
                let itemName = `الصنف ${offer.item_id}`;
                
                // البحث في مصفوفة items عن الصنف المناسب
                const foundItem = this.state.items.find(item => item.item_id === offer.item_id);
                if (foundItem && foundItem.item_nm) {
                    itemName = foundItem.item_nm;
                }
                
                // ✅ بديل: استخدام itemsMap إذا كان موجوداً
                // const itemName = this.itemsMap ? this.itemsMap.get(offer.item_id) : `الصنف ${offer.item_id}`;
                
                const today = new Date();
                const startDate = new Date(offer.start_date);
                const endDate = offer.end_date ? new Date(offer.end_date) : null;
                const daysLeft = endDate ? Math.ceil((endDate - today) / (1000 * 60 * 60 * 24)) : null;
                const daysSinceStart = Math.ceil((today - startDate) / (1000 * 60 * 60 * 24));

                const price1 = offer.offer_price1 ? this.formatNumber(offer.offer_price1) : '-';
                const price2 = offer.offer_price2 ? this.formatNumber(offer.offer_price2) : '-';
                const price3 = offer.offer_price3 ? this.formatNumber(offer.offer_price3) : '-';

                let offerType = '';
                let offerTypeIcon = 'fas fa-percentage';
                
                switch(offer.discount_type) {
                    case 'percentage':
                        offerType = `خصم ${offer.discount_value}%`;
                        offerTypeIcon = 'fas fa-percentage';
                        break;
                    case 'fixed_amount':
                        offerType = `خصم ${this.formatNumber(offer.discount_value)} ج.م`;
                        offerTypeIcon = 'fas fa-money-bill-wave';
                        break;
                    case 'new_price':
                        offerType = 'سعر مباشر';
                        offerTypeIcon = 'fas fa-tag';
                        break;
                    default:
                        offerType = 'عرض';
                        offerTypeIcon = 'fas fa-gift';
                }

                console.log('🔍 إنشاء بطاقة عرض:', {
                    item_id: offer.item_id,
                    item_name: itemName,
                    found_item: foundItem,
                    items_count: this.state.items.length
                });

                return `
                    <div class="offer-card">
                        <div class="offer-header">
                            <div class="offer-title-group">
                                <div class="offer-item-name" title="${itemName}">${itemName}</div>
                                <div class="offer-item-id">كود: ${offer.item_id}</div>
                            </div>
                            <div class="offer-badge">
                                <i class="${offerTypeIcon}"></i>
                                ${offerType}
                            </div>
                        </div>
                        
                        <!-- ✅ حقل عرض اسم الصنف -->
                        <div class="offer-item-display">
                            <i class="fas fa-cube"></i>
                            <strong>اسم الصنف:</strong> ${itemName}
                        </div>
                        
                        <div class="offer-store">
                            <i class="fas fa-store"></i>
                            <strong>المخزن:</strong> ${storeName}
                        </div>

                        <div class="offer-dates">
                            <div class="date-item">
                                <span class="date-label">بدأ منذ:</span>
                                <div class="date-value">${this.formatDate(offer.start_date)}</div>
                                <small>(${daysSinceStart} يوم)</small>
                            </div>
                            <div class="date-item">
                                <span class="date-label">ينتهي:</span>
                                <div class="date-value">${endDate ? this.formatDate(offer.end_date) : 'لا نهائي'}</div>
                                ${daysLeft && daysLeft > 0 ? `<small>(${daysLeft} يوم متبقي)</small>` : ''}
                                ${daysLeft && daysLeft <= 0 ? `<small style="color: red;">(منتهي)</small>` : ''}
                            </div>
                        </div>

                        <div class="offer-prices">
                            <div class="price-item">
                                <div class="price-label">سعر 1</div>
                                <div class="price-value">${price1}</div>
                            </div>
                            <div class="price-item">
                                <div class="price-label">سعر 2</div>
                                <div class="price-value">${price2}</div>
                            </div>
                            <div class="price-item">
                                <div class="price-label">سعر 3</div>
                                <div class="price-value">${price3}</div>
                            </div>
                        </div>

                        <div class="offer-footer">
                            <div class="offer-status ${isActive ? 'status-active' : 'status-inactive'}">
                                <i class="fas ${isActive ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                                ${isActive ? 'نشط' : 'منتهي'}
                            </div>
                            <div class="offer-status" style="color: #6c757d;">
                                <i class="fas fa-user"></i>
                                ${offer.created_by || 'غير معروف'}
                            </div>
                        </div>
                    </div>
                `;
            }
            // إنشاء بطاقة عرض نشط
            createActiveOfferCard(offer) {
                const storeName = offer.store_name || `المخزن ${offer.store_id}`;
                const itemName = offer.item_name || `الصنف ${offer.item_id}`;
                const endDate = offer.end_date ? new Date(offer.end_date) : null;
                const today = new Date();
                const daysLeft = endDate ? Math.ceil((endDate - today) / (1000 * 60 * 60 * 24)) : null;

                const price1 = offer.offer_price1 ? this.formatNumber(offer.offer_price1) : '-';
                const price2 = offer.offer_price2 ? this.formatNumber(offer.offer_price2) : '-';
                const price3 = offer.offer_price3 ? this.formatNumber(offer.offer_price3) : '-';

                let offerType = '';
                switch(offer.discount_type) {
                    case 'percentage':
                        offerType = `خصم ${offer.discount_value}%`;
                        break;
                    case 'fixed_amount':
                        offerType = `خصم ${this.formatNumber(offer.discount_value)} ج.م`;
                        break;
                    case 'new_price':
                        offerType = 'سعر مباشر';
                        break;
                    default:
                        offerType = 'عرض';
                }

                return `
                    <div class="active-offer-card">
                        <div class="active-offer-header">
                            <div class="active-offer-title-group">
                                <div class="active-offer-item-name" title="${itemName}">${itemName}</div>
                                <div class="active-offer-item-id">كود: ${offer.item_id}</div>
                            </div>
                            <div class="active-offer-badge">${offerType}</div>
                        </div>
                        
                        <div class="active-offer-prices">
                            <div class="active-price-item">
                                <div class="price-label">سعر 1</div>
                                <div class="active-price-value">${price1}</div>
                            </div>
                            <div class="active-price-item">
                                <div class="price-label">سعر 2</div>
                                <div class="active-price-value">${price2}</div>
                            </div>
                            <div class="active-price-item">
                                <div class="price-label">سعر 3</div>
                                <div class="active-price-value">${price3}</div>
                            </div>
                        </div>

                        <div class="active-offer-dates">
                            <div>
                                <strong>المخزن:</strong> ${storeName}
                            </div>
                            <div>
                                ${endDate ? `${daysLeft} يوم متبقي` : 'لا نهائي'}
                            </div>
                        </div>
                    </div>
                `;
            }

            // تنسيق الأرقام
            formatNumber(value) {
                if (!value && value !== 0) return '-';
                const num = parseFloat(value);
                return isNaN(num) ? '-' : num.toLocaleString('ar-EG', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            }

            // تنسيق التاريخ
            formatDate(dateString) {
                if (!dateString) return '-';
                try {
                    const date = new Date(dateString);
                    return date.toLocaleDateString('ar-EG');
                } catch {
                    return dateString;
                }
            }

            // ربط الأحداث
            _bindEvents() {
                document.getElementById('applyFilters').addEventListener('click', () => this.applyFilters());
                document.getElementById('resetFilters').addEventListener('click', () => this.resetFilters());
                document.getElementById('refreshData').addEventListener('click', () => this.refreshData());
                
                document.getElementById('statusFilter').addEventListener('change', (e) => {
                    this.state.filters.status = e.target.value;
                    this.applyFilters();
                });
                
                document.getElementById('startDateFilter').addEventListener('change', (e) => {
                    this.state.filters.startDate = e.target.value;
                    this.applyFilters();
                });
                
                document.getElementById('endDateFilter').addEventListener('change', (e) => {
                    this.state.filters.endDate = e.target.value;
                    this.applyFilters();
                });
                
                document.getElementById('itemSearch').addEventListener('input', (e) => {
                    this.state.filters.itemSearch = e.target.value;
                    this.applyFilters();
                });

                // مراقبة حالة الاتصال
                window.addEventListener('online', () => {
                    this.isOnline = true;
                    this.updateConnectionStatus('success', '<i class="fas fa-cloud-check"></i> متصل بالسحابة');
                });

                window.addEventListener('offline', () => {
                    this.isOnline = false;
                    this.updateConnectionStatus('danger', '<i class="fas fa-cloud-slash"></i> غير متصل');
                });
            }

            // التنقل بالـ Enter
            addEnterNavigation() {
                const fields = ['statusFilter', 'startDateFilter', 'endDateFilter', 'itemSearch'];
                fields.forEach(fieldId => {
                    const field = document.getElementById(fieldId);
                    if (field) {
                        field.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                this.applyFilters();
                            }
                        });
                    }
                });
            }

            // إعادة تعيين الفلاتر
            resetFilters() {
                this.state.filters = {
                    status: 'all',
                    startDate: '',
                    endDate: '',
                    itemSearch: ''
                };
                
                document.getElementById('statusFilter').value = 'all';
                document.getElementById('startDateFilter').value = '';
                document.getElementById('endDateFilter').value = '';
                document.getElementById('itemSearch').value = '';
                
                this.applyFilters();
            }

            // تحديث البيانات
            async refreshData() {
                await this.loadOffers();
                this.showMessage('تم تحديث البيانات بنجاح', 'success');
            }

            // عرض رسائل
            showMessage(message, type = 'info') {
                const messageDiv = document.createElement('div');
                messageDiv.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 20px;
                    background: ${type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : '#007bff'};
                    color: white;
                    border-radius: 8px;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                    z-index: 10000;
                    font-weight: 600;
                `;
                messageDiv.textContent = message;
                document.body.appendChild(messageDiv);

                setTimeout(() => {
                    messageDiv.remove();
                }, 3000);
            }

            showError(message) {
                this.showMessage(message, 'error');
            }
        }

        // تهيئة التطبيق
        document.addEventListener('DOMContentLoaded', () => {
            try {
                window.offersApp = new OffersApp();
            } catch (error) {
                console.error('❌ خطأ في تهيئة التطبيق:', error);
                alert('خطأ في تحميل التطبيق: ' + error.message);
            }
        });
    </script>
</body>
</html>
