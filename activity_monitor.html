<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير مراقبة النظام</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #f5f7fa;
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            padding: 25px 30px;
            text-align: center;
            border-bottom: 5px solid #4cc9f0;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header h1 i {
            color: #4cc9f0;
        }

        .filters {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 200px;
        }

        .filter-group label {
            font-weight: 600;
            color: #4361ee;
            font-size: 14px;
        }

        .filter-group select,
        .filter-group input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #4361ee;
            outline: none;
        }

        .btn {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            height: 40px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }

        .btn-export {
            background: linear-gradient(135deg, #4cc9f0, #4361ee);
        }

        .btn-refresh {
            background: linear-gradient(135deg, #4ade80, #3a0ca3);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .content {
            padding: 20px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            border-left: 5px solid #4361ee;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
        }

        .stat-info h3 {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .stat-info p {
            color: #718096;
            font-size: 14px;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
        }

        th {
            padding: 18px 15px;
            text-align: right;
            font-weight: 700;
            color: #2d3748;
            border-bottom: 2px solid #e2e8f0;
            font-size: 15px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        tbody tr {
            transition: background 0.3s;
        }

        tbody tr:hover {
            background: #f7fafc;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: #d1fae5;
            color: #065f46;
        }

        .status-inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .duration {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #cbd5e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pagination button.active {
            background: #4361ee;
            color: white;
            border-color: #4361ee;
        }

        .pagination button:hover:not(:disabled) {
            background: #e2e8f0;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .controls {
                flex-wrap: wrap;
            }
            
            .stats-cards {
                grid-template-columns: 1fr;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> تقرير مراقبة النظام</h1>
            <p>مراقبة نشاطات المستخدمين في النظام</p>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label><i class="fas fa-calendar"></i> التاريخ من</label>
                <input type="date" id="dateFrom">
            </div>
            
            <div class="filter-group">
                <label><i class="fas fa-calendar"></i> التاريخ إلى</label>
                <input type="date" id="dateTo">
            </div>
            
            <div class="filter-group">
                <label><i class="fas fa-store"></i> المخزن</label>
                <select id="storeFilter">
                    <option value="">جميع المخازن</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label><i class="fas fa-user"></i> المستخدم</label>
                <select id="userFilter">
                    <option value="">جميع المستخدمين</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label><i class="fas fa-desktop"></i> الشاشة</label>
                <select id="screenFilter">
                    <option value="">جميع الشاشات</option>
                    <!-- سيتم ملؤها ديناميكياً -->
                </select>
            </div>
            
            <div class="controls">
                <button class="btn btn-refresh" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
                <button class="btn btn-export" id="exportBtn">
                    <i class="fas fa-file-export"></i> تصدير Excel
                </button>
            </div>
        </div>

        <div class="content">
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalUsers">0</h3>
                        <p>عدد المستخدمين النشطين</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-sign-in-alt"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalLogins">0</h3>
                        <p>إجمالي مرات الدخول</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="avgSession">0</h3>
                        <p>متوسط مدة الجلسة (ساعة)</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-desktop"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalScreens">0</h3>
                        <p>إجمالي الشاشات المستخدمة</p>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table id="activityTable">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>المخزن</th>
                            <th>كود المستخدم</th>
                            <th>اسم المستخدم</th>
                            <th>وقت الدخول</th>
                            <th>وقت الخروج</th>
                            <th>مدة الجلسة</th>
                            <th>اسم الشاشة</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- سيتم ملؤها ديناميكياً -->
                        <tr>
                            <td colspan="9" style="text-align: center; padding: 50px;">
                                <i class="fas fa-spinner fa-spin"></i> جاري تحميل البيانات...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination">
                <!-- سيتم إنشاء الترقيم ديناميكياً -->
            </div>
        </div>
    </div>

    <script>
        // إعداد Supabase - حل المشكلة باستخدام متغير مختلف
        let supabaseActivity;
        
        try {
            // محاولة استخدام الاتصال الموجود من main.html إذا كان متاحاً
            if (window.supabaseGlobal) {
                supabaseActivity = window.supabaseGlobal;
                console.log('✅ استخدام اتصال Supabase الموحد من main.html');
            } else {
                // إذا لم يكن موجوداً، إنشاء اتصال جديد
                const SUPABASE_URL = 'https://rvjacvrrpguehbapvewe.supabase.co';
                const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2amFjdnJycGd1ZWhiYXB2ZXdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMwMjUxNTksImV4cCI6MjA3ODYwMTE1OX0.wSavKzxKOF7-56G-pzDMtbXNrCNAbGs0wvadw-cilBg';
                
                supabaseActivity = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✅ تم إنشاء اتصال Supabase جديد لتقرير المراقبة');
            }
        } catch (error) {
            console.error('❌ خطأ في إعداد Supabase:', error);
            // عرض رسالة خطأ في الواجهة
            document.getElementById('tableBody').innerHTML = `
                <tr>
                    <td colspan="9" style="text-align: center; padding: 50px; color: red;">
                        <i class="fas fa-exclamation-triangle"></i> خطأ في الاتصال بقاعدة البيانات
                    </td>
                </tr>
            `;
        }
        
        class ActivityMonitor {
            constructor() {
                this.currentPage = 1;
                this.itemsPerPage = 20;
                this.totalItems = 0;
                this.filters = {
                    dateFrom: null,
                    dateTo: null,
                    storeId: null,
                    userId: null,
                    screenName: null
                };
                
                // تأخير التهيئة حتى نتأكد من اتصال supabase
                if (supabaseActivity) {
                    this.init();
                } else {
                    console.error('❌ لا يمكن تهيئة ActivityMonitor بدون اتصال Supabase');
                }
            }
            
            async init() {
                await this.loadFilters();
                await this.loadActivityData();
                this.setupEventListeners();
            }
            
            async loadFilters() {
                try {
                    if (!supabaseActivity) {
                        console.error('❌ لا يوجد اتصال Supabase');
                        return;
                    }
                    
                    // تحميل المخازن
                    const { data: stores, error: storesError } = await supabaseActivity
                        .from('stores')
                        .select('store_id, store_name')
                        .order('store_name');
                    
                    if (storesError) throw storesError;
                    
                    const storeSelect = document.getElementById('storeFilter');
                    if (stores && stores.length > 0) {
                        stores.forEach(store => {
                            const option = document.createElement('option');
                            option.value = store.store_id;
                            option.textContent = store.store_name;
                            storeSelect.appendChild(option);
                        });
                    }
                    
                    // تحميل المستخدمين
                    const { data: users, error: usersError } = await supabaseActivity
                        .from('users')
                        .select('user_id, username, full_name')
                        .eq('active', true)
                        .order('username');
                    
                    if (usersError) throw usersError;
                    
                    const userSelect = document.getElementById('userFilter');
                    if (users && users.length > 0) {
                        users.forEach(user => {
                            const option = document.createElement('option');
                            option.value = user.user_id;
                            option.textContent = `${user.username} - ${user.full_name || ''}`;
                            userSelect.appendChild(option);
                        });
                    }
                    
                    // تحميل أسماء الشاشات من main.html
                    this.loadScreenNames();
                    
                } catch (error) {
                    console.error('❌ خطأ في تحميل المرشحات:', error);
                }
            }
            
            loadScreenNames() {
                // أسماء الشاشات من main.html
                const screens = [
                    'ادخال الاقسام', 'ادخال الموظفين', 'ادخال المرتبات', 'ادخال حضور وانصراف',
                    'بيانات المنشأة', 'اكواد الفروع', 'أكواد الوحدات', 'أكواد الموردين',
                    'أكواد عملاء', 'أكواد الاصناف', 'بيانات الأصناف بالفروع', 'تحويل بين الفروع',
                    'استلام التحويل', 'عروض الاسعار', 'إدخال المشتريات', 'مرتجع المشتريات',
                    'إدخال المبيعات', 'مرتجع المبيعات', 'تقرير المشتريات', 'تقرير مرتجع مشتريات',
                    'تقرير المبيعات', 'تقرير مرتجع مبيعات', 'تقرير حركة الفروع', 'تقرير تحويل بين الفروع',
                    'تقرير استلام التحويل', 'تقرير جرود الفروع', 'تقرير الكاشير', 'تقرير تحليلى شامل للفروع',
                    'اكواد الحسابات', 'شجرة الحسابات', 'حركة الحسابات', 'التقارير المالية',
                    'تقرير تحليلى حسابات', 'بحث بالكود او بالاسم', 'العروض المتاحه',
                    'ادخال مستخدم جديد للنظام', 'صلاحيات المستخدمين', 'تقرير بتعاملات النظام'
                ];
                
                const screenSelect = document.getElementById('screenFilter');
                screens.forEach(screen => {
                    const option = document.createElement('option');
                    option.value = screen;
                    option.textContent = screen;
                    screenSelect.appendChild(option);
                });
            }
            
            async loadActivityData() {
                try {
                    if (!supabaseActivity) {
                        throw new Error('لا يوجد اتصال بقاعدة البيانات');
                    }
                    
                    const tableBody = document.getElementById('tableBody');
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="9" style="text-align: center; padding: 50px;">
                                <i class="fas fa-spinner fa-spin"></i> جاري تحميل البيانات...
                            </td>
                        </tr>
                    `;
                    
                    // بناء استعلام مع المرشحات
                    let query = supabaseActivity
                        .from('activity_log')
                        .select(`
                            *,
                            users:user_id (username, full_name),
                            stores:store_id (store_name)
                        `, { count: 'exact' });
                    
                    // تطبيق المرشحات
                    if (this.filters.dateFrom) {
                        query = query.gte('activity_date', this.filters.dateFrom);
                    }
                    
                    if (this.filters.dateTo) {
                        query = query.lte('activity_date', this.filters.dateTo);
                    }
                    
                    if (this.filters.storeId) {
                        query = query.eq('store_id', this.filters.storeId);
                    }
                    
                    if (this.filters.userId) {
                        query = query.eq('user_id', this.filters.userId);
                    }
                    
                    if (this.filters.screenName) {
                        query = query.ilike('screen_name', `%${this.filters.screenName}%`);
                    }
                    
                    // التحديد الصحيح للصفحات
                    const from = (this.currentPage - 1) * this.itemsPerPage;
                    const to = from + this.itemsPerPage - 1;
                    
                    const { data, error, count } = await query
                        .order('login_time', { ascending: false })
                        .range(from, to);
                    
                    if (error) throw error;
                    
                    this.totalItems = count || 0;
                    
                    // تحديث الإحصائيات
                    await this.updateStatistics();
                    
                    // عرض البيانات
                    this.renderTable(data || []);
                    this.renderPagination();
                    
                } catch (error) {
                    console.error('❌ خطأ في تحميل البيانات:', error);
                    document.getElementById('tableBody').innerHTML = `
                        <tr>
                            <td colspan="9" style="text-align: center; padding: 50px; color: red;">
                                <i class="fas fa-exclamation-triangle"></i> حدث خطأ في تحميل البيانات: ${error.message}
                            </td>
                        </tr>
                    `;
                }
            }
            
            async updateStatistics() {
                try {
                    if (!supabaseActivity) return;
                    
                    // إجمالي المستخدمين النشطين اليوم
                    const today = new Date().toISOString().split('T')[0];
                    const { data: activeUsers } = await supabaseActivity
                        .from('activity_log')
                        .select('user_id', { distinct: true })
                        .eq('activity_date', today);
                    
                    document.getElementById('totalUsers').textContent = activeUsers?.length || 0;
                    
                    // إجمالي مرات الدخول
                    const { data: logins } = await supabaseActivity
                        .from('activity_log')
                        .select('log_id')
                        .not('login_time', 'is', null);
                    
                    document.getElementById('totalLogins').textContent = logins?.length || 0;
                    
                    // متوسط مدة الجلسة
                    const { data: sessions } = await supabaseActivity
                        .from('activity_log')
                        .select('login_time, logout_time')
                        .not('login_time', 'is', null)
                        .not('logout_time', 'is', null);
                    
                    let totalDuration = 0;
                    sessions?.forEach(session => {
                        const duration = new Date(session.logout_time) - new Date(session.login_time);
                        totalDuration += duration;
                    });
                    
                    const avgDuration = sessions?.length > 0 ? totalDuration / sessions.length : 0;
                    const avgHours = (avgDuration / (1000 * 60 * 60)).toFixed(2);
                    document.getElementById('avgSession').textContent = avgHours;
                    
                    // إجمالي الشاشات المستخدمة
                    const { data: screens } = await supabaseActivity
                        .from('activity_log')
                        .select('screen_name', { distinct: true })
                        .not('screen_name', 'is', null);
                    
                    document.getElementById('totalScreens').textContent = screens?.length || 0;
                    
                } catch (error) {
                    console.error('❌ خطأ في تحديث الإحصائيات:', error);
                }
            }
            
            renderTable(data) {
                const tableBody = document.getElementById('tableBody');
                
                if (!data || data.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="9" style="text-align: center; padding: 50px;">
                                <i class="fas fa-database"></i> لا توجد بيانات متاحة
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                tableBody.innerHTML = '';
                
                data.forEach(log => {
                    const row = document.createElement('tr');
                    
                    // حساب مدة الجلسة
                    let duration = '';
                    if (log.login_time && log.logout_time) {
                        const login = new Date(log.login_time);
                        const logout = new Date(log.logout_time);
                        const diff = logout - login;
                        const hours = Math.floor(diff / (1000 * 60 * 60));
                        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        duration = `${hours} س ${minutes} د`;
                    }
                    
                    // حالة الجلسة
                    let status = '';
                    let statusClass = '';
                    if (log.logout_time) {
                        status = 'مغلقة';
                        statusClass = 'status-inactive';
                    } else if (log.login_time) {
                        status = 'نشطة';
                        statusClass = 'status-active';
                    }
                    
                    row.innerHTML = `
                        <td>${log.activity_date || ''}</td>
                        <td>${log.stores?.store_name || 'غير محدد'}</td>
                        <td>${log.user_id || ''}</td>
                        <td>${log.users?.username || 'غير معروف'}</td>
                        <td>${log.login_time ? new Date(log.login_time).toLocaleTimeString('ar-EG') : ''}</td>
                        <td>${log.logout_time ? new Date(log.logout_time).toLocaleTimeString('ar-EG') : ''}</td>
                        <td><span class="duration">${duration}</span></td>
                        <td>${log.screen_name || 'تسجيل دخول'}</td>
                        <td><span class="status-badge ${statusClass}">${status}</span></td>
                    `;
                    
                    tableBody.appendChild(row);
                });
            }
            
            renderPagination() {
                const pagination = document.getElementById('pagination');
                pagination.innerHTML = '';
                
                const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
                
                if (totalPages <= 1) return;
                
                // زر السابق
                const prevButton = document.createElement('button');
                prevButton.innerHTML = '<i class="fas fa-chevron-right"></i>';
                prevButton.disabled = this.currentPage === 1;
                prevButton.onclick = () => {
                    if (this.currentPage > 1) {
                        this.currentPage--;
                        this.loadActivityData();
                    }
                };
                pagination.appendChild(prevButton);
                
                // أزرار الأرقام
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= this.currentPage - 2 && i <= this.currentPage + 2)) {
                        const pageButton = document.createElement('button');
                        pageButton.textContent = i;
                        pageButton.className = i === this.currentPage ? 'active' : '';
                        pageButton.onclick = () => {
                            this.currentPage = i;
                            this.loadActivityData();
                        };
                        pagination.appendChild(pageButton);
                    } else if (i === this.currentPage - 3 || i === this.currentPage + 3) {
                        const ellipsis = document.createElement('span');
                        ellipsis.textContent = '...';
                        ellipsis.style.padding = '8px';
                        pagination.appendChild(ellipsis);
                    }
                }
                
                // زر التالي
                const nextButton = document.createElement('button');
                nextButton.innerHTML = '<i class="fas fa-chevron-left"></i>';
                nextButton.disabled = this.currentPage === totalPages;
                nextButton.onclick = () => {
                    if (this.currentPage < totalPages) {
                        this.currentPage++;
                        this.loadActivityData();
                    }
                };
                pagination.appendChild(nextButton);
            }
            
            setupEventListeners() {
                // زر التحديث
                document.getElementById('refreshBtn').addEventListener('click', () => {
                    this.currentPage = 1;
                    this.loadActivityData();
                });
                
                // زر التصدير
                document.getElementById('exportBtn').addEventListener('click', () => {
                    this.exportToExcel();
                });
                
                // مرشح التاريخ من
                document.getElementById('dateFrom').addEventListener('change', (e) => {
                    this.filters.dateFrom = e.target.value;
                    this.currentPage = 1;
                    this.loadActivityData();
                });
                
                // مرشح التاريخ إلى
                document.getElementById('dateTo').addEventListener('change', (e) => {
                    this.filters.dateTo = e.target.value;
                    this.currentPage = 1;
                    this.loadActivityData();
                });
                
                // مرشح المخزن
                document.getElementById('storeFilter').addEventListener('change', (e) => {
                    this.filters.storeId = e.target.value || null;
                    this.currentPage = 1;
                    this.loadActivityData();
                });
                
                // مرشح المستخدم
                document.getElementById('userFilter').addEventListener('change', (e) => {
                    this.filters.userId = e.target.value || null;
                    this.currentPage = 1;
                    this.loadActivityData();
                });
                
                // مرشح الشاشة
                document.getElementById('screenFilter').addEventListener('change', (e) => {
                    this.filters.screenName = e.target.value || null;
                    this.currentPage = 1;
                    this.loadActivityData();
                });
                
                // تطبيق المرشحات عند الضغط على Enter
                document.querySelectorAll('.filter-group input, .filter-group select').forEach(element => {
                    element.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            this.currentPage = 1;
                            this.loadActivityData();
                        }
                    });
                });
            }
            
            async exportToExcel() {
                try {
                    if (!supabaseActivity) {
                        throw new Error('لا يوجد اتصال بقاعدة البيانات');
                    }
                    
                    // جمع كل البيانات (بدون ترقيم الصفحات)
                    let query = supabaseActivity
                        .from('activity_log')
                        .select(`
                            *,
                            users:user_id (username, full_name),
                            stores:store_id (store_name)
                        `);
                    
                    // تطبيق نفس المرشحات
                    if (this.filters.dateFrom) {
                        query = query.gte('activity_date', this.filters.dateFrom);
                    }
                    
                    if (this.filters.dateTo) {
                        query = query.lte('activity_date', this.filters.dateTo);
                    }
                    
                    if (this.filters.storeId) {
                        query = query.eq('store_id', this.filters.storeId);
                    }
                    
                    if (this.filters.userId) {
                        query = query.eq('user_id', this.filters.userId);
                    }
                    
                    if (this.filters.screenName) {
                        query = query.ilike('screen_name', `%${this.filters.screenName}%`);
                    }
                    
                    const { data, error } = await query
                        .order('login_time', { ascending: false });
                    
                    if (error) throw error;
                    
                    // تحويل البيانات إلى تنسيق Excel
                    const csvContent = this.convertToCSV(data || []);
                    
                    // تنزيل الملف
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a');
                    const url = URL.createObjectURL(blob);
                    
                    const date = new Date().toISOString().split('T')[0];
                    link.setAttribute('href', url);
                    link.setAttribute('download', `activity_log_${date}.csv`);
                    link.style.visibility = 'hidden';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    alert('✅ تم تصدير البيانات بنجاح');
                    
                } catch (error) {
                    console.error('❌ خطأ في التصدير:', error);
                    alert('❌ حدث خطأ أثناء تصدير البيانات: ' + error.message);
                }
            }
            
            convertToCSV(data) {
                const headers = [
                    'التاريخ', 'المخزن', 'كود المستخدم', 'اسم المستخدم',
                    'وقت الدخول', 'وقت الخروج', 'مدة الجلسة', 'اسم الشاشة', 'الحالة'
                ];
                
                const rows = data.map(log => {
                    // حساب مدة الجلسة
                    let duration = '';
                    if (log.login_time && log.logout_time) {
                        const login = new Date(log.login_time);
                        const logout = new Date(log.logout_time);
                        const diff = logout - login;
                        const hours = Math.floor(diff / (1000 * 60 * 60));
                        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        duration = `${hours} س ${minutes} د`;
                    }
                    
                    // حالة الجلسة
                    let status = '';
                    if (log.logout_time) {
                        status = 'مغلقة';
                    } else if (log.login_time) {
                        status = 'نشطة';
                    }
                    
                    return [
                        log.activity_date || '',
                        log.stores?.store_name || 'غير محدد',
                        log.user_id || '',
                        log.users?.username || 'غير معروف',
                        log.login_time ? new Date(log.login_time).toLocaleTimeString('ar-EG') : '',
                        log.logout_time ? new Date(log.logout_time).toLocaleTimeString('ar-EG') : '',
                        duration,
                        log.screen_name || 'تسجيل دخول',
                        status
                    ];
                });
                
                // إضافة علامة BOM للتعرف على الترميز العربي في Excel
                const BOM = '\uFEFF';
                const csv = [
                    headers.join(','),
                    ...rows.map(row => row.join(','))
                ].join('\n');
                
                return BOM + csv;
            }
        }
        
        // تهيئة النظام عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            if (supabaseActivity) {
                window.activityMonitor = new ActivityMonitor();
                
                // تعيين تاريخ اليوم كقيمة افتراضية
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('dateFrom').value = today;
                document.getElementById('dateTo').value = today;
            } else {
                // عرض رسالة خطأ إذا فشل الاتصال
                document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 50px; color: red;">
                            <i class="fas fa-exclamation-triangle"></i> فشل في الاتصال بقاعدة البيانات. يرجى التأكد من اتصال الإنترنت.
                        </td>
                    </tr>
                `;
            }
        });
    </script>
</body>
