<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث في المخزون</title>
    <!-- إضافة Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        /* شريط حالة الاتصال */
        .connection-status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            font-size: 12px;
            border-left: 4px solid #3498db;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .connection-status.supabase {
            border-left-color: #27ae60;
            background: #f8fff9;
        }
        
        .connection-status.offline {
            border-left-color: #e74c3c;
            background: #fff5f5;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-dot.connected {
            background: #27ae60;
        }
        
        .status-dot.disconnected {
            background: #e74c3c;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* مؤشر التحميل */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 8px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
            border-left: 4px solid #f44336;
            display: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .user-info {
            background: #ecf0f1;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #bdc3c7;
        }
        
        .search-section {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            position: relative;
        }
        
        .search-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }
        
        .form-group {
            margin-bottom: 0;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .form-control {
            width: 100%;
            padding: 10px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            border-color: #3498db;
            outline: none;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #5a6268);
            color: white;
            margin-right: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .results-section {
            padding: 20px;
        }
        
        .section-title {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .results-table th {
            background: #34495e;
            color: white;
            padding: 12px 8px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #2c3e50;
        }
        
        .results-table td {
            padding: 10px 8px;
            text-align: center;
            border: 1px solid #ecf0f1;
            transition: background 0.3s;
        }
        
        .results-table tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        .results-table tr:hover {
            background: #e8f6f3;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 18px;
        }
        
        .results-count {
            background: #27ae60;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
        }
        
        .error {
            background: #e74c3c;
        }
        
        .warning {
            background: #f39c12;
        }
        
        .stock-low {
            background: #ffebee !important;
            color: #c62828;
            font-weight: bold;
        }
        
        .stock-medium {
            background: #fff3e0 !important;
            color: #ef6c00;
        }
        
        .stock-good {
            background: #e8f5e8 !important;
            color: #2e7d32;
        }
        
        @media (max-width: 768px) {
            .connection-status {
                top: 10px;
                left: 10px;
                right: 10px;
                text-align: center;
            }
            
            .search-form {
                grid-template-columns: 1fr;
            }
            
            .results-table {
                font-size: 12px;
            }
            
            .results-table th,
            .results-table td {
                padding: 6px 4px;
            }
        }
    </style>
</head>
<body>
    <!-- شريط حالة الاتصال -->
    <div id="connectionStatus" class="connection-status offline">
        <span class="status-dot disconnected"></span>
        <span id="statusText">جارٍ الاتصال...</span>
    </div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-search"></i> بحث في المخزون</h1>
            <p>البحث عن الأصناف في المخازن</p>
        </div>
        
        <div class="user-info">
            <div id="userInfo">مرحباً: </div>
            <div>
                <button class="btn btn-primary" onclick="window.location.href='main.html'">
                    <i class="fas fa-home"></i> القائمة الرئيسية
                </button>
            </div>
        </div>

        <div class="search-section">
            <!-- مؤشر التحميل -->
            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="spinner"></div>
            </div>
            
            <!-- رسالة الخطأ -->
            <div id="errorMessage" class="error-message"></div>
            
            <form class="search-form" onsubmit="window.inventorySearchManager.search(); return false;">
                <div class="form-group">
                    <label for="storeSelect">الفرع:</label>
                    <select id="storeSelect" class="form-control">
                        <option value="">كل المخازن</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="itemSearch">كود أو اسم الصنف:</label>
                    <input type="text" id="itemSearch" class="form-control" placeholder="أدخل كود أو اسم الصنف...">
                </div>
                
                <div class="form-group">
                    <label for="supplierSelect">المورد:</label>
                    <select id="supplierSelect" class="form-control">
                        <option value="">كل الموردين</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-success" id="searchBtn">
                        <i class="fas fa-search"></i> بحث
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="window.inventorySearchManager.clearSearch()">
                        <i class="fas fa-eraser"></i> مسح
                    </button>
                </div>
            </form>
        </div>

        <div class="results-section">
            <div class="section-title">نتائج البحث</div>
            <div id="resultsCount" class="results-count" style="display: none;"></div>
            <div id="searchResults">
                <div class="no-results">⏳ أدخل معايير البحث ثم انقر على زر البحث</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // 🔧 مدير البحث في المخزون باستخدام النظام الموحد
        class InventorySearchManager {
            constructor() {
                console.log('🚀 إنشاء مثيل لمدير البحث في المخزون...');
                
                // حالة التطبيق
                this.state = {
                    currentData: [],
                    isOnline: false
                };
                
                // اتصال Supabase
                this.supabaseClient = null;
                
                // تهيئة المدير
                this.init();
            }

            // ======================== 🏗️ تهيئة المدير ========================
            async init() {
                try {
                    console.log('🔧 بدء تهيئة مدير البحث في المخزون...');
                    
                    // التحقق من عناصر DOM
                    if (!this.checkRequiredDOM()) {
                        console.log('⏳ في انتظار تحميل DOM...');
                        setTimeout(() => this.init(), 500);
                        return;
                    }
                    
                    // تهيئة Supabase باستخدام النظام المركزي
                    await this.initSupabase();
                    
                    // تحميل البيانات
                    await this.loadStores();
                    await this.loadSuppliers();
                    
                    // إعداد الأحداث
                    this.setupEventListeners();
                    this.setupEnterNavigation();
                    
                    console.log('✅ تم تهيئة مدير البحث في المخزون بنجاح');
                    
                } catch (error) {
                    console.error('❌ خطأ في تهيئة المدير:', error);
                    this.showAlert('خطأ في تهيئة النظام، جاري إعادة المحاولة...', 'danger');
                    setTimeout(() => this.init(), 2000);
                }
            }

            // ======================== 🌐 نظام الاتصال Supabase ========================

            // ✅ تهيئة Supabase باستخدام النظام المركزي
            async initSupabase() {
                console.log('🌐 محاولة تهيئة Supabase باستخدام النظام المركزي...');
                
                try {
                    // الطريقة المفضلة: استخدام النظام المركزي
                    if (window.supabaseManager) {
                        this.supabaseClient = await window.supabaseManager.getClient();
                        
                        if (this.supabaseClient) {
                            console.log('✅ تم استخدام النظام المركزي لـ Supabase');
                            
                            // اختبار الاتصال
                            await this.checkConnection();
                            
                            // تحديث حالة الاتصال إذا كان المكون موجوداً
                            if (window.connectionStatus) {
                                window.connectionStatus.update(true);
                            }
                            
                            return true;
                        }
                    }
                    
                    // الطريقة الاحتياطية: اتصال مباشر
                    console.warn('⚠️ النظام المركزي غير متاح، استخدام اتصال مباشر');
                    
                    if (window.supabase && window.supabase.createClient) {
                        this.supabaseClient = window.supabase.createClient(
                            'https://rvjacvrrpguehbapvewe.supabase.co',
                            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2amFjdnJycGd1ZWhiYXB2ZXdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMwMjUxNTksImV4cCI6MjA3ODYwMTE1OX0.wSavKzxKOF7-56G-pzDMtbXNrCNAbGs0wvadw-cilBg'
                        );
                        
                        console.log('✅ تم إنشاء اتصال مباشر بـ Supabase');
                        
                        // اختبار الاتصال
                        await this.checkConnection();
                        
                        return true;
                    }
                    
                    throw new Error('لا يمكن تهيئة Supabase');
                    
                } catch (error) {
                    console.error('❌ فشل في تهيئة Supabase:', error);
                    
                    this.updateConnectionStatus(false);
                    this.showAlert('خطأ في الاتصال بقاعدة البيانات', 'danger');
                    
                    return false;
                }
            }

            // ✅ التحقق من اتصال Supabase
            async checkConnection() {
                try {
                    const { data, error } = await this.supabaseClient
                        .from('stores')
                        .select('store_id')
                        .limit(1);
                    
                    if (!error) {
                        this.state.isOnline = true;
                        this.updateConnectionStatus(true);
                        return true;
                    } else {
                        throw error;
                    }
                } catch (error) {
                    this.state.isOnline = false;
                    this.updateConnectionStatus(false);
                    console.error('الاتصال بـ Supabase فشل:', error);
                    return false;
                }
            }

            // ✅ تحديث حالة الاتصال
            updateConnectionStatus(connected) {
                const statusElement = document.getElementById('connectionStatus');
                const statusText = document.getElementById('statusText');
                
                if (!statusElement || !statusText) return;
                
                if (connected) {
                    this.state.isOnline = true;
                    statusElement.className = 'connection-status supabase';
                    statusElement.querySelector('.status-dot').className = 'status-dot connected';
                    statusText.textContent = 'متصل بـ Supabase';
                } else {
                    this.state.isOnline = false;
                    statusElement.className = 'connection-status offline';
                    statusElement.querySelector('.status-dot').className = 'status-dot disconnected';
                    statusText.textContent = 'غير متصل';
                }
            }

            // ✅ التحقق من اتصال Supabase قبل أي عملية
            async checkSupabaseConnection() {
                if (!this.supabaseClient) {
                    await this.initSupabase();
                }
                return !!this.supabaseClient && this.state.isOnline;
            }

            // ======================== 🏗️ إدارة DOM ========================

            // ✅ التحقق من عناصر DOM المطلوبة
            checkRequiredDOM() {
                const requiredElements = [
                    'storeSelect',
                    'itemSearch',
                    'supplierSelect',
                    'searchResults'
                ];
                
                for (const elementId of requiredElements) {
                    if (!document.getElementById(elementId)) {
                        console.log(`⏳ في انتظار العنصر: ${elementId}`);
                        return false;
                    }
                }
                
                return true;
            }

            // ======================== 🎯 إعداد الأحداث ========================

            // ✅ إعداد مستمعي الأحداث
            setupEventListeners() {
                try {
                    console.log('🎯 إعداد مستمعي الأحداث...');
                    
                    // البحث أثناء الكتابة
                    const itemSearch = document.getElementById('itemSearch');
                    if (itemSearch) {
                        itemSearch.addEventListener('input', (e) => {
                            if (e.target.value.length >= 2) {
                                this.search();
                            }
                        });
                    }
                    
                    console.log('✅ اكتمل إعداد مستمعي الأحداث');
                    
                } catch (error) {
                    console.error('❌ خطأ في إعداد مستمعي الأحداث:', error);
                }
            }

            // ✅ إعداد التنقل بـ Enter
            setupEnterNavigation() {
                const fields = [
                    'storeSelect', 'itemSearch', 'supplierSelect'
                ];

                fields.forEach(fieldId => {
                    const field = document.getElementById(fieldId);
                    if (field) {
                        field.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                this.search();
                            }
                        });
                    }
                });
            }

            // ======================== 📊 دوال تحميل البيانات ========================

            // ✅ تحميل المخازن
            async loadStores() {
                try {
                    const connected = await this.checkSupabaseConnection();
                    if (!connected) return;

                    const { data, error } = await this.supabaseClient
                        .from('stores')
                        .select('store_id, store_name')
                        .order('store_id');
                    
                    if (error) throw error;
                    
                    const storeSelect = document.getElementById('storeSelect');
                    
                    data.forEach(store => {
                        const storeName = store.store_name || `المخزن ${store.store_id}`;
                        const option = new Option(storeName, store.store_id);
                        storeSelect.add(option);
                    });
                    
                    console.log(`✅ تم تحميل ${data.length} مخزن`);
                    
                } catch (error) {
                    console.error('❌ خطأ في تحميل المخازن:', error);
                    this.showError('حدث خطأ في تحميل قائمة المخازن');
                }
            }

            // ✅ تحميل الموردين
            async loadSuppliers() {
                try {
                    const connected = await this.checkSupabaseConnection();
                    if (!connected) return;

                    const { data, error } = await this.supabaseClient
                        .from('suppliers')
                        .select('supplierid, supplier_name')
                        .order('supplierid');
                    
                    if (error) throw error;
                    
                    const supplierSelect = document.getElementById('supplierSelect');
                    
                    data.forEach(supplier => {
                        const supplierName = supplier.supplier_name || supplier.supplierid;
                        const option = new Option(supplierName, supplier.supplierid);
                        supplierSelect.add(option);
                    });
                    
                    console.log(`✅ تم تحميل ${data.length} مورد`);
                    
                } catch (error) {
                    console.error('❌ خطأ في تحميل الموردين:', error);
                    this.showError('حدث خطأ في تحميل قائمة الموردين');
                }
            }

            // ======================== 🔍 دوال البحث ========================

            // ✅ البحث في المخزون
            async search() {
                try {
                    this.setLoading(true);
                    this.hideError();
                    
                    const filters = this.getFilters();
                    
                    console.log('🔍 البحث بالمعايير:', filters);
                    
                    const connected = await this.checkSupabaseConnection();
                    if (!connected) {
                        this.showError('❌ لا يوجد اتصال بقاعدة البيانات');
                        return;
                    }
                    
                    // جلب البيانات من Supabase
                    let query = this.supabaseClient
                        .from('a_master')
                        .select(`
                            *,
                            stores!inner(store_name),
                            suppliers(supplier_name),
                            items!inner(item_nm)
                        `);
                    
                    // تطبيق الفلاتر
                    if (filters.storeId) {
                        query = query.eq('store_id', parseInt(filters.storeId));
                    }
                    if (filters.supplierId) {
                        query = query.eq('supplierid', filters.supplierId);
                    }
                    if (filters.searchText) {
                        query = query.or(`item_id.ilike.%${filters.searchText}%,item_nm.ilike.%${filters.searchText}%`);
                    }
                    
                    // تطبيق الترتيب
                    query = query.order('item_id', { ascending: true });
                    
                    const { data, error } = await query;
                    
                    if (error) throw error;
                    
                    // التحقق من أن البيانات مصفعدة
                    if (!Array.isArray(data)) {
                        throw new Error('البيانات المرجعة ليست بصيغة صحيحة');
                    }
                    
                    this.state.currentData = data;
                    this.renderResults(data);
                    
                } catch (error) {
                    console.error('❌ خطأ في البحث:', error);
                    this.showError(`حدث خطأ في البحث: ${error.message}`);
                    this.renderResults([]);
                } finally {
                    this.setLoading(false);
                }
            }

            // ✅ الحصول على فلاتر البحث
            getFilters() {
                const filters = {
                    storeId: document.getElementById('storeSelect')?.value || null,
                    supplierId: document.getElementById('supplierSelect')?.value || null,
                    searchText: document.getElementById('itemSearch')?.value.trim() || null
                };

                // إزالة القيم الفارغة
                Object.keys(filters).forEach(key => {
                    if (!filters[key]) {
                        delete filters[key];
                    }
                });

                return filters;
            }

            // ✅ مسح البحث
            clearSearch() {
                const storeSelect = document.getElementById('storeSelect');
                const itemSearch = document.getElementById('itemSearch');
                const supplierSelect = document.getElementById('supplierSelect');
                const searchResults = document.getElementById('searchResults');
                const resultsCount = document.getElementById('resultsCount');
                
                if (storeSelect) storeSelect.value = '';
                if (itemSearch) itemSearch.value = '';
                if (supplierSelect) supplierSelect.value = '';
                
                if (searchResults) {
                    searchResults.innerHTML = '<div class="no-results">⏳ أدخل معايير البحث ثم انقر على زر البحث</div>';
                }
                
                if (resultsCount) {
                    resultsCount.style.display = 'none';
                }
                
                this.hideError();
                
                if (itemSearch) {
                    itemSearch.focus();
                }
            }

            // ======================== 🎨 دوال العرض ========================

            // ✅ عرض نتائج البحث
            renderResults(data) {
                const container = document.getElementById('searchResults');
                const countElement = document.getElementById('resultsCount');
                
                if (!container || !countElement) return;
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="no-results">⚠️ لا توجد نتائج تطابق معايير البحث</div>';
                    countElement.style.display = 'none';
                    return;
                }

                let html = `
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>المخزن</th>
                                <th>كود الصنف</th>
                                <th>اسم الصنف</th>
                                <th>الكمية</th>
                                <th>حد الطلب</th>
                                <th>سعر الشراء</th>
                                <th>سعر البيع</th>
                                <th>المورد</th>
                                <th>آخر حركة</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.forEach((item, index) => {
                    const stockClass = this.getStockClass(item.item_qty, item.min_qty);
                    const itemName = item.items ? item.items.item_nm : (item.item_nm || '');
                    html += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${item.stores ? item.stores.store_name : item.store_id}</td>
                            <td><strong>${item.item_id}</strong></td>
                            <td style="text-align: right;">${itemName}</td>
                            <td class="${stockClass}"><strong>${this.formatNumber(item.item_qty)}</strong></td>
                            <td>${this.formatNumber(item.min_qty)}</td>
                            <td>${this.formatNumber(item.buy_price)}</td>
                            <td>${this.formatNumber(item.sale_price1)}</td>
                            <td>${item.suppliers ? item.suppliers.supplier_name : item.supplierid}</td>
                            <td>${this.formatDateTime(item.tran_date)}</td>
                            <td>${this.getStatusText(item.item_qty, item.min_qty)}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
                
                // تحديث العداد
                countElement.textContent = `عدد النتائج: ${data.length}`;
                countElement.style.display = 'inline-block';
            }

            // ✅ تحديد فئة المخزون
            getStockClass(quantity, minQuantity) {
                const qty = parseFloat(quantity) || 0;
                const minQty = parseFloat(minQuantity) || 0;
                
                if (minQty > 0 && qty <= minQty) return 'stock-low';
                if (minQty > 0 && qty <= minQty * 2) return 'stock-medium';
                if (qty > 0) return 'stock-good';
                return '';
            }

            // ✅ نص حالة المخزون
            getStatusText(quantity, minQuantity) {
                const qty = parseFloat(quantity) || 0;
                const minQty = parseFloat(minQuantity) || 0;
                
                if (qty === 0) return '<span style="color: #e74c3c;">⛔ غير متوفر</span>';
                if (minQty > 0 && qty <= minQty) return '<span style="color: #e74c3c;">⚠️ منخفض</span>';
                if (minQty > 0 && qty <= minQty * 2) return '<span style="color: #f39c12;">📊 متوسط</span>';
                return '<span style="color: #27ae60;">✅ جيد</span>';
            }

            // ======================== 🛠️ دوال مساعدة ========================

            // ⏳ تعيين حالة التحميل
            setLoading(loading) {
                const overlay = document.getElementById('loadingOverlay');
                const btn = document.getElementById('searchBtn');
                
                if (!overlay || !btn) return;
                
                if (loading) {
                    overlay.style.display = 'flex';
                    btn.innerHTML = '<div class="loading-spinner"></div> جارٍ البحث...';
                    btn.disabled = true;
                } else {
                    overlay.style.display = 'none';
                    btn.innerHTML = '<i class="fas fa-search"></i> بحث';
                    btn.disabled = false;
                }
            }

            // 💬 عرض رسالة خطأ
            showError(message) {
                const errorElement = document.getElementById('errorMessage');
                if (errorElement) {
                    errorElement.textContent = message;
                    errorElement.style.display = 'block';
                }
            }

            // 💬 إخفاء رسالة الخطأ
            hideError() {
                const errorElement = document.getElementById('errorMessage');
                if (errorElement) {
                    errorElement.style.display = 'none';
                }
            }

            // 💬 عرض رسالة Toast
            showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                if (!toast) return;
                
                toast.textContent = message;
                toast.className = `toast ${type}`;
                toast.style.display = 'block';
                
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 3000);
            }

            // 🔢 تنسيق الأرقام
            formatNumber(value) {
                if (!value && value !== 0) return '';
                const num = parseFloat(value);
                return isNaN(num) ? '' : num.toLocaleString('ar-EG', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            }

            // 📅 تنسيق التاريخ والوقت
            formatDateTime(dt) {
                if (!dt) return '-';
                const d = new Date(dt);
                return d.toLocaleString('ar-EG');
            }

            // 💬 عرض تنبيه
            showAlert(message, type) {
                try {
                    // إزالة التنبيهات القديمة
                    const oldAlerts = document.querySelectorAll('.alert');
                    oldAlerts.forEach(alert => alert.remove());

                    const alertDiv = document.createElement('div');
                    alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
                    alertDiv.innerHTML = `
                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    `;
                    
                    const container = document.querySelector('.container');
                    if (container) {
                        container.insertBefore(alertDiv, container.firstChild);
                        
                        setTimeout(() => {
                            if (alertDiv.parentElement) {
                                alertDiv.remove();
                            }
                        }, 5000);
                    }
                } catch (error) {
                    console.error('❌ خطأ في عرض التنبيه:', error);
                }
            }
        }

        // ======================== 🚀 تشغيل التطبيق ========================

        // تشغيل التطبيق عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 الصفحة محملة بالكامل، بدء تهيئة مدير البحث في المخزون...');
            
            // تأخير بسيط لضمان تحميل المكتبات
            setTimeout(() => {
                try {
                    // إنشاء وتشغيل المدير
                    window.inventorySearchManager = new InventorySearchManager();
                    console.log('🎉 تم إنشاء مدير البحث في المخزون');
                    
                } catch (error) {
                    console.error('❌ فشل في إنشاء مدير البحث في المخزون:', error);
                }
            }, 1000);
        });
    </script>

    <!-- تحميل مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
